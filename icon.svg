<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="0.5" stop-color="#9d4bff"/>
      <stop offset="1" stop-color="#ff2bd6"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- maskable-safe background: full bleed, key art kept within central 80% -->
  <rect width="512" height="512" rx="112" fill="#05060d"/>
  <rect x="14" y="14" width="484" height="484" rx="104" fill="none" stroke="url(#g)" stroke-width="3" opacity="0.5"/>
  <!-- neon air-stroke swoosh -->
  <path d="M120 360 C 180 200, 300 180, 392 152" fill="none" stroke="url(#g)" stroke-width="26"
        stroke-linecap="round" filter="url(#glow)"/>
  <!-- fingertip node -->
  <circle cx="392" cy="152" r="26" fill="#fff" filter="url(#glow)"/>
  <circle cx="392" cy="152" r="40" fill="none" stroke="#00e5ff" stroke-width="5" opacity="0.8"/>
  <!-- sparks -->
  <circle cx="332" cy="118" r="6" fill="#ff2bd6"/>
  <circle cx="430" cy="206" r="5" fill="#00e5ff"/>
  <circle cx="300" cy="200" r="4" fill="#9d4bff"/>
</svg>
